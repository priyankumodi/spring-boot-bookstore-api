spring.application.name=bookstore

# 1. Database Connection String
# Points to your local machine (localhost), default port (5432), and your new DB (bookstore)
spring.datasource.url=jdbc:postgresql://localhost:5432/bookstore
spring.datasource.username=postgres
spring.datasource.password=

# 2. Hibernate/JPA Automation
# 'update' means Spring will look at your Java classes and automatically create or
# update the tables in Postgres every time you start the app.
spring.jpa.hibernate.ddl-auto=update

# 3. SQL Logging
# This is very helpful for learning. It prints the actual SQL commands
# Spring is running to your IntelliJ console.
spring.jpa.show-sql=true

# 4. Postgres Dialect
# This ensures Hibernate uses the correct "language" specifically for PostgreSQL.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
